<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Josiah Thurlow</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--sage:#7A9E87;--forest:#4A6B55;--stone:#F2EDE6;--charcoal:#2A2A2A;--warm-wh:#FAF8F5;}
body{font-family:'Jost',sans-serif;background:var(--warm-wh);color:var(--charcoal);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{max-width:540px;text-align:center;}
.dot{width:64px;height:64px;border-radius:50%;background:var(--sage);margin:0 auto 32px;display:flex;align-items:center;justify-content:center;}
.dot svg{width:30px;height:30px;stroke:#fff;stroke-width:2.5;fill:none;}
.label{font-size:11px;letter-spacing:0.28em;text-transform:uppercase;color:var(--sage);margin-bottom:16px;}
h1{font-family:'Cormorant Garamond',serif;font-size:46px;font-weight:500;line-height:1.05;margin-bottom:20px;}
h1 em{font-style:italic;color:var(--sage);}
p{font-size:16px;line-height:1.65;color:#555;font-weight:300;margin-bottom:14px;}
.note{font-size:14px;color:#888;margin-top:8px;}
.btn{display:inline-block;margin-top:32px;background:var(--sage);color:#fff;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;padding:15px 36px;text-decoration:none;font-weight:500;transition:background .25s,transform .2s;}
.btn:hover{background:var(--forest);transform:translateY(-1px);}
.divider{width:40px;height:1px;background:rgba(122,158,135,0.4);margin:28px auto;}
</style>
</head>
<body>
  <div class="card">
    <div class="dot">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="label">Request Received</div>
    <h1>Thank you.<br><em>We'll be in touch.</em></h1>
    <p>Your request has come through. Josiah will personally reach out within 24 hours to set up your free 20-minute call.</p>
    <div class="divider"></div>
    <p class="note">Prefer to pick a time right now? You can book your free call directly below.</p>
    <a href="https://calendly.com/josiah-josiahthurlow/20-minute-meeting" target="_blank" rel="noopener" class="btn">Book My Free Call</a>
    <p class="note" style="margin-top:36px;"><a href="/" style="color:var(--sage);text-decoration:none;">← Back to home</a></p>
  </div>
</body>
</html>
